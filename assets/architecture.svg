<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1080" width="1440" height="1080" role="img" aria-labelledby="title desc">
  <title id="title">A-Stockit Architecture</title>
  <desc id="desc">A-Stockit architecture diagram showing the host layer, bundle discovery surfaces, public skill surface, execution split, shared implementation modules, artifact storage, and external inputs.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .title { font: 700 32px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #162033; }
      .subtitle { font: 500 15px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #52627d; }
      .panel-title { font: 700 19px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #20304a; }
      .card-title { font: 700 15px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #23344d; }
      .label { font: 600 13px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #2f415c; }
      .body { font: 400 12.5px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #566883; }
      .tiny { font: 400 11.5px "IBM Plex Sans", "Segoe UI", Arial, sans-serif; fill: #657690; }
      .panel { fill: #ffffff; stroke: #cbd6e6; stroke-width: 2; }
      .host { fill: #f7faff; stroke: #9db8ea; stroke-width: 1.6; }
      .surface { fill: #edf3ff; stroke: #5c8ff0; stroke-width: 1.8; }
      .skill { fill: #fff7e9; stroke: #daab48; stroke-width: 1.4; }
      .runtime { fill: #edf8f0; stroke: #4f9a67; stroke-width: 1.6; }
      .artifact { fill: #eef7ff; stroke: #5e9bd0; stroke-width: 1.4; }
      .note { fill: #f7f1ff; stroke: #8b73cd; stroke-width: 1.4; }
      .decision { fill: #fff1d7; stroke: #d48f1f; stroke-width: 2; }
      .chip { fill: #ffffff; stroke: #d7e0ee; stroke-width: 1.1; }
      .arrow { stroke: #5b6880; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #7d8aa3; stroke-width: 2; fill: none; marker-end: url(#arrowhead-soft); }
      .arrow-data { stroke: #4f9a67; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead-data); }
      .arrow-dashed { stroke: #8b73cd; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrowhead-note); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5b6880"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7d8aa3"/>
    </marker>
    <marker id="arrowhead-data" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#4f9a67"/>
    </marker>
    <marker id="arrowhead-note" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8b73cd"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1440" height="1080" class="bg"/>

  <text x="720" y="58" text-anchor="middle" class="title">A-Stockit Architecture</text>
  <text x="720" y="86" text-anchor="middle" class="subtitle">Bundle-first A-share skill layer for host agents, bounded execution, and durable artifacts</text>

  <rect x="60" y="112" width="1320" height="132" rx="14" class="panel"/>
  <text x="720" y="144" text-anchor="middle" class="panel-title">Host Layer</text>

  <rect x="96" y="164" width="286" height="58" rx="10" class="host"/>
  <text x="120" y="188" class="card-title">User requests</text>
  <text x="120" y="206" class="body">watchlists, briefs, reviews, backtests</text>

  <rect x="418" y="164" width="286" height="58" rx="10" class="surface"/>
  <text x="442" y="188" class="card-title">Host agent / router</text>
  <text x="442" y="202" class="body">Claude Code, Codex,</text>
  <text x="442" y="217" class="body">OpenClaw, other hosts</text>

  <rect x="740" y="164" width="286" height="58" rx="10" class="host"/>
  <text x="764" y="188" class="card-title">Runtime commands</text>
  <text x="764" y="202" class="body">registry, market-brief,</text>
  <text x="764" y="217" class="body">paper-trading, session-status</text>

  <rect x="1062" y="164" width="282" height="58" rx="10" class="note"/>
  <text x="1086" y="188" class="card-title">Status policy</text>
  <text x="1086" y="206" class="body">ok, partial, stale, error</text>

  <rect x="60" y="268" width="1320" height="620" rx="16" class="panel"/>
  <text x="720" y="302" text-anchor="middle" class="panel-title">A-Stockit Bundle · skills/astockit/</text>
  <text x="720" y="326" text-anchor="middle" class="subtitle">Public surfaces route first. Shared Python modules and artifacts stay behind the skill boundary.</text>

  <rect x="90" y="346" width="290" height="250" rx="12" class="surface"/>
  <text x="235" y="376" text-anchor="middle" class="panel-title">Discovery and Contracts</text>

  <rect x="114" y="398" width="242" height="34" rx="8" class="chip"/>
  <text x="235" y="420" text-anchor="middle" class="label">index.md</text>

  <rect x="114" y="442" width="242" height="50" rx="8" class="chip"/>
  <text x="235" y="464" text-anchor="middle" class="label">_registry/</text>
  <text x="235" y="481" text-anchor="middle" class="body">bundle.json · skills.json · runtime.json</text>

  <rect x="114" y="502" width="242" height="50" rx="8" class="chip"/>
  <text x="235" y="524" text-anchor="middle" class="label">_docs/</text>
  <text x="235" y="541" text-anchor="middle" class="body">catalog · runtime · contracts</text>

  <rect x="114" y="562" width="242" height="28" rx="8" class="chip"/>
  <text x="235" y="580" text-anchor="middle" class="label">&lt;skill&gt;/SKILL.md</text>

  <rect x="404" y="346" width="636" height="456" rx="12" class="panel"/>
  <text x="722" y="376" text-anchor="middle" class="panel-title">Public Skill Surface</text>
  <text x="722" y="398" text-anchor="middle" class="subtitle">24 registered skills grouped by workflow role</text>

  <rect x="428" y="422" width="282" height="130" rx="10" class="skill"/>
  <text x="569" y="450" text-anchor="middle" class="card-title">Data and Context</text>
  <text x="569" y="472" text-anchor="middle" class="body">5 skills</text>
  <text x="569" y="494" text-anchor="middle" class="body">market-data · stock-data</text>
  <text x="569" y="512" text-anchor="middle" class="body">fundamental-context</text>
  <text x="569" y="530" text-anchor="middle" class="body">news-intel · data-sync</text>

  <rect x="734" y="422" width="282" height="130" rx="10" class="skill"/>
  <text x="875" y="450" text-anchor="middle" class="card-title">Research and Decisions</text>
  <text x="875" y="472" text-anchor="middle" class="body">6 skills</text>
  <text x="875" y="494" text-anchor="middle" class="body">market-brief · analysis</text>
  <text x="875" y="512" text-anchor="middle" class="body">market-analyze · technical-scan</text>
  <text x="875" y="530" text-anchor="middle" class="body">decision-support · strategy-design</text>

  <rect x="428" y="568" width="282" height="136" rx="10" class="skill"/>
  <text x="569" y="596" text-anchor="middle" class="card-title">Universe and Monitoring</text>
  <text x="569" y="618" text-anchor="middle" class="body">6 skills</text>
  <text x="569" y="640" text-anchor="middle" class="body">market-screen · watchlist-import</text>
  <text x="569" y="658" text-anchor="middle" class="body">watchlist · decision-dashboard</text>
  <text x="569" y="676" text-anchor="middle" class="body">market-recap · session-status</text>

  <rect x="734" y="568" width="282" height="136" rx="10" class="skill"/>
  <text x="875" y="596" text-anchor="middle" class="card-title">History and Utilities</text>
  <text x="875" y="618" text-anchor="middle" class="body">7 skills</text>
  <text x="875" y="640" text-anchor="middle" class="body">reports · analysis-history</text>
  <text x="875" y="658" text-anchor="middle" class="body">backtest-evaluator · paper-trading</text>
  <text x="875" y="676" text-anchor="middle" class="body">strategy-chat · feishu-notify</text>
  <text x="875" y="694" text-anchor="middle" class="body">model-capability-advisor</text>

  <rect x="428" y="720" width="588" height="36" rx="8" class="note"/>
  <text x="722" y="743" text-anchor="middle" class="label">18 code-backed skills · 6 workflow-only skills</text>

  <rect x="428" y="766" width="588" height="32" rx="8" class="chip"/>
  <text x="722" y="782" text-anchor="middle" class="tiny">Workflow-only: strategy-chat · technical-scan · analysis-history</text>
  <text x="722" y="794" text-anchor="middle" class="tiny">data-sync · reports · watchlist</text>

  <rect x="1064" y="346" width="286" height="360" rx="12" class="panel"/>
  <text x="1207" y="376" text-anchor="middle" class="panel-title">Execution Boundary</text>

  <polygon points="1207,408 1282,456 1207,504 1132,456" class="decision"/>
  <text x="1207" y="452" text-anchor="middle" class="card-title">Code-backed</text>
  <text x="1207" y="468" text-anchor="middle" class="card-title">skill?</text>

  <rect x="1090" y="534" width="234" height="62" rx="10" class="runtime"/>
  <text x="1207" y="558" text-anchor="middle" class="card-title">Local run.py</text>
  <text x="1207" y="577" text-anchor="middle" class="body">explicit inputs, status, artifacts</text>

  <rect x="1090" y="616" width="234" height="80" rx="10" class="host"/>
  <text x="1207" y="640" text-anchor="middle" class="card-title">Workflow path</text>
  <text x="1207" y="660" text-anchor="middle" class="body">host composes SKILL.md, docs,</text>
  <text x="1207" y="678" text-anchor="middle" class="body">registry metadata, shared helpers</text>
  <text x="1207" y="692" text-anchor="middle" class="tiny">no dedicated local executor</text>

  <rect x="90" y="610" width="290" height="264" rx="12" class="runtime"/>
  <text x="235" y="640" text-anchor="middle" class="panel-title">Shared Implementation · _src/</text>

  <rect x="114" y="668" width="112" height="34" rx="8" class="artifact"/>
  <text x="170" y="690" text-anchor="middle" class="label">core/</text>
  <rect x="244" y="668" width="112" height="34" rx="8" class="artifact"/>
  <text x="300" y="690" text-anchor="middle" class="label">market/</text>

  <rect x="114" y="714" width="112" height="34" rx="8" class="artifact"/>
  <text x="170" y="736" text-anchor="middle" class="label">research/</text>
  <rect x="244" y="714" width="112" height="34" rx="8" class="artifact"/>
  <text x="300" y="736" text-anchor="middle" class="label">strategies/</text>

  <rect x="114" y="760" width="112" height="34" rx="8" class="artifact"/>
  <text x="170" y="782" text-anchor="middle" class="label">backtest/</text>
  <rect x="244" y="760" width="112" height="34" rx="8" class="artifact"/>
  <text x="300" y="782" text-anchor="middle" class="label">integrations/</text>

  <text x="235" y="820" text-anchor="middle" class="body">Runtime, market logic, research,</text>
  <text x="235" y="838" text-anchor="middle" class="body">strategies, backtests, integrations</text>

  <rect x="404" y="810" width="636" height="64" rx="12" class="note"/>
  <text x="722" y="838" text-anchor="middle" class="card-title">Internal recovery helper</text>
  <text x="722" y="858" text-anchor="middle" class="body">fix-everything supports recovery but is not in _registry/skills.json</text>

  <rect x="1064" y="610" width="286" height="264" rx="12" class="runtime"/>
  <text x="1207" y="640" text-anchor="middle" class="panel-title">Durable Outputs · _artifacts/</text>

  <rect x="1090" y="668" width="104" height="32" rx="8" class="artifact"/>
  <text x="1142" y="689" text-anchor="middle" class="label">runs/</text>
  <rect x="1220" y="668" width="104" height="32" rx="8" class="artifact"/>
  <text x="1272" y="689" text-anchor="middle" class="label">reports/</text>

  <rect x="1090" y="710" width="104" height="32" rx="8" class="artifact"/>
  <text x="1142" y="731" text-anchor="middle" class="label">backtests/</text>
  <rect x="1220" y="710" width="104" height="32" rx="8" class="artifact"/>
  <text x="1272" y="731" text-anchor="middle" class="label">paper/</text>

  <rect x="1090" y="752" width="104" height="32" rx="8" class="artifact"/>
  <text x="1142" y="773" text-anchor="middle" class="label">sessions/</text>
  <rect x="1220" y="752" width="104" height="32" rx="8" class="artifact"/>
  <text x="1272" y="773" text-anchor="middle" class="label">history/</text>

  <rect x="1090" y="794" width="104" height="32" rx="8" class="artifact"/>
  <text x="1142" y="815" text-anchor="middle" class="label">manifests/</text>
  <rect x="1220" y="794" width="104" height="32" rx="8" class="artifact"/>
  <text x="1272" y="815" text-anchor="middle" class="label">exports/</text>

  <text x="1207" y="842" text-anchor="middle" class="body">report.md, state.json,</text>
  <text x="1207" y="858" text-anchor="middle" class="body">ledgers, exports, history</text>

  <rect x="60" y="904" width="1320" height="84" rx="14" class="panel"/>
  <text x="720" y="936" text-anchor="middle" class="panel-title">External Inputs and Enrichments</text>

  <rect x="102" y="950" width="218" height="22" rx="7" class="chip"/>
  <text x="211" y="965" text-anchor="middle" class="tiny">market data providers</text>
  <rect x="340" y="950" width="218" height="22" rx="7" class="chip"/>
  <text x="449" y="965" text-anchor="middle" class="tiny">user watchlists and symbols</text>
  <rect x="578" y="950" width="218" height="22" rx="7" class="chip"/>
  <text x="687" y="965" text-anchor="middle" class="tiny">headline evidence and fundamentals</text>
  <rect x="816" y="950" width="218" height="22" rx="7" class="chip"/>
  <text x="925" y="965" text-anchor="middle" class="tiny">portfolio assumptions</text>
  <rect x="1054" y="950" width="284" height="22" rx="7" class="chip"/>
  <text x="1196" y="965" text-anchor="middle" class="tiny">host context + fail-open enrichments</text>
</svg>
